<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>margin塌陷问题</title>
    <style>
        .father{
            background-color: rgb(230, 233, 71);
            width: 400px;
            /* height: 400px; */
            
            overflow: hidden;/*消除margin塌陷问题*/
        }
        .d1 {
            background-color: aqua;
            width: 100px;
            height: 100px;
            margin-top: 50px;
        }

        .d2 {
            background-color: rgb(0, 255, 55);
            width: 100px;
            height: 100px;
            margin-bottom: 50px;
        }
    </style>
</head>

<body>
    <div class="father">
        <div class="d1">1</div>
        <div class="d2">2</div>
    </div>
    <div>测试文字</div>

</body>

</html>
