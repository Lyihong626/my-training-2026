<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        "use strict"
        class Person {
            name = "孙悟空";
            age = 18;
            gender;

            constructor() {
                this.gender = "男";
            }

            sayHello() {
                console.log("hello,我是",this.name);
            }
        }

        const p = new Person();
        console.log(p);//person
        /*
            访问一个对象的原型对象
                对象.__proto__
        */
        // console.log(p.__proto__);
        console.log(Object.getPrototypeOf(p)===p.__proto__);//true

        console.log(p.__proto__);
        console.log(p.__proto__.__proto__);
        console.log(p.constructor);

        console.log(p.sayHello());//hello,我是 孙悟空
        
        Person.prototype.sayHello=()=>{
            console.log("大家好");
        }
        //Person.prototype 会影响所有实例，因为所有实例共享同一个原型对象
        console.log(p.sayHello());//大家好



    </script>
</head>

<body>

</body>

</html>
