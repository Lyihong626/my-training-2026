<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        //函数
         //三种函数声明方式
        function fn(){
            console.log("你好");
            console.log("hello");
            console.log("萨瓦迪卡");
        }

        fn();

        console.log(typeof fn);
        
        const fn2=function(){
            console.log("方式二");
        }

        const fn3 = ()=>{
            console.log("箭头函数");
        }

        const fn4 = ()=> console.log("箭头函数");

        fn2();
        fn3();
        fn4();

        function fn5(a,b){
            console.log(a+b);
        }
        fn5(1,3);

        const fn6=(a,b)=>{
            console.log("a=",a);
            console.log("b=",b);
        }
        fn6(3,"aaaa");
        fn6({},"aaaa");

        //箭头函数只有一个参数的时候，省略（）
        const fn7=a=>{
            console.log("a=",a);
        }
        fn7(666);

        //默认参数
        const fn8=(a=19,b=20,c=30)=>{
            console.log("a=",a);
            console.log("b=",b);
            console.log("c=",c);
        }
        fn8(1,2);

        //对象作为参数

        let obj = {
            name:"孙悟空"
        }

        function fn9(a={name:"猪八戒"}){
            console.log("a=",a);
            a.name="唐僧";
            console.log("a=",a);
        }
        //如果再调用函数里定义参数，不会改变
        fn9({name:"沙和尚"});
        fn9({name:"沙和尚"});
        //使用外面的参数，会被改变
        fn9(obj);
        fn9(obj);

        //函数作为参数
        function fn10(a){
            console.log("a=",a);
        }

        fn10(()=>console.log("我是匿名函数"));

        function fn11(){
            // return 123;
            //return后面的代码不再执行
        }

        let result = fn11();
        console.log(result);

        //箭头函数的返回值可以直接写在箭头后
        //如果直接在箭头后设置对象字面量为返回值时，对象字面量必须使用()括起来


        const sum=(a,b)=>a+b;
        console.log(sum(2,3));

        const fn12=()=>({name:"孙悟空"});
        console.log(fn12());


        //作用域链
        let x=123
        {
            let x=456
            {
                console.log(x);//输出456
            }
        }

    </script>
</head>
<body>
    
</body>
</html>
