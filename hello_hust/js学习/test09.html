<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        "use strict"
        //面向对象，类
        //类的代码块自带严格模式
        class dog{

        }
        class person{

            #name;
            #age;
            #gender;

            constructor(name,age,gender){
                this.name=name;
                this.age=age;
                this.gender=gender;
            }


            //加上#  私有属性，只能在类里面用
            #address = "花果山";

            // name = "孙悟空";
            // age = 18;
            static test = "test静态属性";
            static hh = "静态属性";

            sayHello(){
                console.log("大家好");
            }
            static sayHH(){
                console.log("我是静态方法");
            }

            introduce(){
                console.log(this);
            }

            //间接访问私有属性
            getName(){
                return this.#name;
            }

            setName(name){
                this.#name = name;
            }

            //=====简单的方式=====
            get gender(){
                return this.#gender;
            }
            set gender(gender){
                this.#gender=gender;
            }
            

        }
        const a = new dog();
        const b = new person("孙悟空",18,"男");

        console.log(a instanceof dog);
        console.log(a instanceof person);
        //静态属性只能通过类去访问

        console.log(b);
        console.log(b.test);//无法访问
        console.log(person.hh);

        //方法
        b.sayHello();
        person.sayHH();
        b.introduce();

        console.log(b.getName());
        b.setName("猪八戒");
        console.log(b.getName());

        console.log(b.gender);
        b.gender = "man";
        console.log(b.gender);


        //===============多态================
        /*
        定义一个函数，这个函数将接收一个对象作为参数，他可以输出hello并打印对象的name属性
        多态
        -在JS中不会检查参数的类型，所以这就意味着任何数招都可以作为参数传递-要调用某个函数，无需指定的类型，只要对象满足某些条件即可
        -如果一个东西走路像鸭子，叫起来像鸭子，那么它就是鸭子
        I
        -多态为我们提供了灵活性

        */
        function sayHello(obj){
            if(obj instanceof person)
                console.log("hello"+obj.name);
        }

        sayHello(b);

        //=============继承==============
        class Animai{
            constructor(name){
                this.name = name;
            }
            sayHello(){
                console.log("动物在叫！");
            }
        }

        class Dog extends Animai{
            //重写构造函数 
            sayHello(){
                console.log("汪汪汪！");
            }

        }
        class Cat extends Animai{
            sayHello(){
                console.log("喵喵喵！");
            }
        }

        const c = new Dog();
        const d = new Cat();

        c.sayHello();
        d.sayHello();


    </script>
</head>
<body>
    
</body>
</html>
