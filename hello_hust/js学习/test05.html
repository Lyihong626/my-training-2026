<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        /*
        循环语句
        - JS中一共有三种循环语句
            while语句
            do-while语句
            for语句

        while语句
        -语法:
        while(条件表达式){
        语句...
        }

        -执行流程:
        while语句在执行时，会先对条件表达式进行判断，
        如果结果为true，则执行循环体，执行完毕，继续判断
        如果为true，则再次执行循环体，执行完毕，继续判断，如此重复知道条件表达式结果为false时，循环结束

        */
        let a=0;

        /*
        while(a<5){
            console.log(a);
            a++;
        }
            */
        
        /*
        do-while
        -执行顺序:
            do-while语句在执行时，会先执行do后的循环体，
            执行完毕后，会对while后的条件表达式进行判断如果为false，则循环终止
            如果为true，则继续执行循环体，以此类推

        */
        
        /*
        do{
            console.log(a);
            a++;
        }while(a<5);
        */

        /*
        for循环
        -语法:
                for(a初始化表达式;o条件表达式;a更新表达式){
                o语句...
                }
        -执行流程:
            执行初始化表达式，初始化变量
            执行条件表达式，判断循环是否执行（true执行，false终止>判断结果为true，则执行循环体
            执行更新表达式，对初始化变量进行修改重复@，知道判断为false为止
            -初始化表达式，在循环的整个的生命周期中只会执行1次- for循环中的三个表达式都可以省略

        */
       for(let i=0;i<5;i++){
            console.log(i);
       }




    </script>
</head>

</body>
</html>
